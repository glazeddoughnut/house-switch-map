<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breaker Map</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="hero">
        <div class="page-nav">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="switches.html">Switches</a>
          <a class="nav-link active" href="breakers.html">Breakers</a>
        </div>

        <h1>Breaker Map</h1>
        <p class="subtitle">
          Track panel labels, mapped circuits, and which switches and rooms each breaker affects.
        </p>

        <div class="controls">
          <input
            id="breakerSearchInput"
            class="search"
            type="search"
            placeholder="Search breaker label, circuit, room, or control..."
            aria-label="Search breakers"
          />
        </div>
      </div>
    </header>

    <main class="layout breakers-layout">
      <section class="panel">
        <div class="panel-header">
          <span>Unmapped Circuits</span>
          <span id="unmappedCount" class="panel-subtle">0</span>
        </div>
        <div id="unmappedContent" class="content"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <span>Breakers</span>
          <span id="breakerCount" class="panel-subtle">0 shown</span>
        </div>
        <div id="breakersContent" class="content"></div>
      </section>
    </main>
  </div>

  <script type="module" src="breakersPage.js"></script>
</body>
</html>
